name: music_team_app
description: A music learning app for the team — lessons, practice, projects, and gamification.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  # firebase_messaging: ^15.2.5  # Added back in Phase 7 (notifications)

  # Google Sign-In
  google_sign_in: ^6.2.2

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^17.0.0

  # Audio (ear training)
  just_audio: ^0.10.5

  # File & Media
  file_picker: ^10.3.10
  video_player: ^2.9.5
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1

  # Permissions
  permission_handler: ^12.0.1

  # Charts & Visualization
  fl_chart: ^1.1.0

  # Animations
  lottie: ^3.3.1

  # Notifications
  flutter_local_notifications: ^19.5.0

  # Fonts & UI
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  path_provider: ^2.1.5
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/audio/
    - assets/audio/piano/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#6C3FE8"
    theme_color: "#6C3FE8"
  min_sdk_android: 21
